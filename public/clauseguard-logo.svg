  </defs>

  <!-- Shield body -->
  <path d="M128 16
           L216 48
           V116
           C216 176 180 216 128 240
           C76 216 40 176 40 116
           V48
           Z"
        fill="url(#shieldGrad)"
        stroke="#0B1220"
