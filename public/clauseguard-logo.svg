        stroke="#3B82F6"
        stroke-width="2"
        opacity="0.35"/>

  <!-- Document -->
  <rect x="94" y="78" width="68" height="86" rx="6" fill="#F8FAFC"/>
  <rect x="94" y="78" width="68" height="86" rx="6" fill="none" stroke="#CBD5E1" stroke-width="1.5"/>

  <!-- Document lines -->
  <line x1="106" y1="98" x2="150" y2="98" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  <line x1="106" y1="112" x2="150" y2="112" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  <line x1="106" y1="126" x2="134" y2="126" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>

  <!-- Check badge -->
  <circle cx="150" cy="150" r="26" fill="url(#accentGrad)" stroke="#0F172A" stroke-width="2"/>
  <path d="M138 150 L147 159 L164 140"
